<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Portal — RiskLens-AI</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">
</head>

<body>
  <div class="bg-animation">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
  </div>

  <div class="app-layout">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <a href="/dashboard.html" class="sidebar-logo">
          <span class="logo-icon">📈</span>
          RiskLens-AI
        </a>
      </div>
      
      <div class="sidebar-menu">
        <a href="/dashboard.html" class="menu-item">
          <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
          Dashboard
        </a>
        <a href="/watchlist.html" class="menu-item">
          <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
          Watchlist
        </a>
        <a href="/news.html" class="menu-item">
          <svg viewBox="0 0 24 24"><path d="M19 20H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h10l6 6v10a2 2 0 0 1-2 2z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
          News
        </a>
        <a href="/profile.html" class="menu-item">
          <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
          Settings
        </a>
        <a href="/admin.html" class="menu-item active">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
          Admin
        </a>
      </div>

      <div class="sidebar-footer">
        <div class="upgrade-card">
          <h4>Upgrade AI 🧠</h4>
          <p>Unlock pro forecasting</p>
          <button class="btn btn-primary w-full btn-sm">Try Now</button>
        </div>
      </div>
    </aside>

    <!-- CONTENT WRAPPER -->
    <div class="main-wrapper">
      <!-- TOPBAR -->
      <header class="topbar">
        <div class="topbar-left">
          <div style="font-weight: 600; font-size: 18px;">Admin Dashboard</div>
        </div>
        <div class="topbar-right">
          <div class="nav-avatar" onclick="window.location.href='/profile.html'"><span id="nav-initials">U</span></div>
          <button class="btn btn-secondary btn-sm" onclick="logout()">Logout</button>
        </div>
      </header>

      <!-- MAIN CONTENT -->
      <main class="main-content">
        <div class="dashboard-header mb-3">
          <h1 style="font-size:32px; font-weight:900;">Admin Portal</h1>
        </div>

        <div class="grid-2 mb-3" id="admin-stats">
        </div>

        <div class="glass-card">
          <h3 style="font-weight:700; margin-bottom:16px;">Registered Users</h3>
          <table class="data-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Joined</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="user-table-body">
            </tbody>
          </table>
        </div>
      </main>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>
  <script src="js/common.js"></script>
  <script src="js/admin.js"></script>
</body>

</html>

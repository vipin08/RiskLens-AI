<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Log in to RiskLens-AI — AI-Powered Stock Analysis Platform">
  <title>Log In — RiskLens-AI</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">
</head>
<body>
  <div class="bg-animation">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
  </div>

  <nav class="navbar">
    <a href="/" class="logo">
      <span class="logo-icon"></span>
      RiskLens-AI
    </a>
    <div class="nav-right">
      <a href="/signup.html" class="btn btn-primary btn-sm">Sign Up</a>
    </div>
  </nav>

  <div class="auth-container">
    <div class="auth-card glass-card">
      <h2>Welcome Back</h2>
      <p class="auth-subtitle">Sign in to access your dashboard and watchlists.</p>
      
      <form id="login-form">
        <div class="input-group">
          <label for="login-email">Email Address</label>
          <input type="email" id="login-email" class="input-field" placeholder="john@example.com" required>
        </div>
        
        <div class="input-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" class="input-field" placeholder="Enter your password" required>
        </div>

        <div id="login-error" style="display:none; color:var(--accent-red); font-size:14px; padding:10px; background:rgba(239,68,68,0.1); border-radius:var(--radius-sm);"></div>

        <button type="submit" class="btn btn-primary btn-lg w-full" id="login-btn" style="justify-content:center;">
          Sign In
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="/signup.html">Create one</a>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
